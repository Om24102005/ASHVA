<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ASHVA — The Road Is Calling</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="device" id="device">
  <div class="grain"></div>
  <!-- status bar -->
  <div id="bar" style="position:absolute;top:0;left:0;right:0;height:50px;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 28px 0;pointer-events:none">
    <span style="font-family:'Space Grotesk';font-weight:600;font-size:15px;letter-spacing:.5px">9:41</span>
    <div style="display:flex;gap:7px;align-items:center">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#F4EBDD"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="1.5" width="3" height="10.5" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity=".4"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none" stroke="#F4EBDD" stroke-width="1.3"><path d="M1 4.2C4.4 1.3 12.6 1.3 16 4.2M3.2 6.7c2.9-2.4 7.7-2.4 10.6 0M5.6 9.1c1.5-1.2 4.3-1.2 5.8 0" stroke-linecap="round"/></svg>
      <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="21" height="11" rx="3" stroke="#F4EBDD" stroke-opacity=".5"/><rect x="3" y="3" width="16" height="7" rx="1.5" fill="#F4EBDD"/><rect x="23.5" y="4" width="2" height="5" rx="1" fill="#F4EBDD" opacity=".5"/></svg>
    </div>
  </div>
  <div id="app"></div>
  <!-- bottom nav -->
  <div id="nav" style="position:absolute;left:0;right:0;bottom:0;z-index:40;display:none"></div>
  <!-- home indicator -->
  <div class="home-indicator" style="position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:#F4EBDD;opacity:.55;z-index:70;pointer-events:none"></div>
</div>

<!-- runtime config (API URL) + API client -->
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/google-init.js"></script>
<!-- data layer -->
<script src="js/data.js"></script>
<!-- shared helpers + chrome -->
<script src="js/helpers.js"></script>
<!-- one file per screen -->
<script src="js/screens/auth.js"></script>
<script src="js/screens/gatekeeper.js"></script>
<script src="js/screens/home.js"></script>
<script src="js/screens/detail.js"></script>
<script src="js/screens/booking.js"></script>
<script src="js/screens/gear.js"></script>
<script src="js/screens/kyc.js"></script>
<script src="js/screens/payment.js"></script>
<script src="js/screens/pass.js"></script>
<script src="js/screens/routes.js"></script>
<script src="js/screens/route.js"></script>
<script src="js/screens/routebikes.js"></script>
<script src="js/screens/bookings.js"></script>
<script src="js/screens/trip.js"></script>
<script src="js/screens/garage.js"></script>
<script src="js/screens/gsub.js"></script>
<script src="js/screens/admin.js"></script>
<script src="js/screens/adminfleet.js"></script>
<script src="js/screens/adminaddbike.js"></script>
<script src="js/screens/adminbookings.js"></script>
<script src="js/screens/adminusers.js"></script>
<script src="js/screens/adminkyc.js"></script>
<!-- router / state machine -->
<script src="js/app.js"></script>
<!-- native shell bridge (Capacitor iOS/Android · no-op in the browser) -->
<script src="js/native.js"></script>
</body>
</html>
