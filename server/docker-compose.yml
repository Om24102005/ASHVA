# ASHVA — backend stack: Postgres + MinIO (KYC storage) + API
# Spin up:  docker compose --env-file .env up -d --build
# Logs:     docker compose logs -f api
# Wipe:     docker compose down -v
services:
  db:
    image: postgres:16-alpine
    container_name: ashva_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ashva}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-ashva}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      TZ: UTC
      PGTZ: UTC
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ashva_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ashva} -d ${POSTGRES_DB:-ashva}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt: [no-new-privileges:true]
    networks: [ashva_net]

  minio:
    image: minio/minio:latest
    container_name: ashva_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ashva}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ashva_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [ashva_net]

  minio-init:
    image: minio/mc:latest
    container_name: ashva_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-ashva} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${S3_BUCKET:-kyc} || true;
      mc anonymous set download local/${S3_BUCKET:-kyc} || true;
      echo 'bucket ready';
      "
    networks: [ashva_net]

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ashva_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # default development so OTP codes print to `docker compose logs -f api`
      # before MSG91 keys exist. Set NODE_ENV=production for real delivery.
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: 4000
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER:-ashva}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-ashva}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_DAYS: ${JWT_EXPIRES_DAYS:-30}
      OTP_TTL_SEC: ${OTP_TTL_SEC:-300}
      MSG91_AUTHKEY: ${MSG91_AUTHKEY}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID}
      MSG91_SMS_TEMPLATE_ID: ${MSG91_SMS_TEMPLATE_ID}
      MSG91_EMAIL_FROM: ${MSG91_EMAIL_FROM}
      MSG91_EMAIL_DOMAIN: ${MSG91_EMAIL_DOMAIN}
      MSG91_EMAIL_TEMPLATE_ID: ${MSG91_EMAIL_TEMPLATE_ID}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-kyc}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-ashva}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${API_PORT:-4000}:4000"
    security_opt: [no-new-privileges:true]
    networks: [ashva_net]

  adminer:
    image: adminer:4
    container_name: ashva_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT:-8090}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: dracula
    networks: [ashva_net]

volumes:
  ashva_pgdata:
    name: ashva_pgdata
  ashva_minio:
    name: ashva_minio

networks:
  ashva_net:
    name: ashva_net
    driver: bridge
