<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>ASHVA Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overscroll-behavior: none; }
    body {
      background: #17110D;
      color: #F4EBDD;
      font-family: 'Space Grotesk', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    #app {
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
    }
    input, button, select, textarea { font-family: inherit; border-radius: 0; }
    input:focus { outline: none; }
    a { color: inherit; text-decoration: none; }
    /* press tap effect */
    .press { cursor: pointer; -webkit-tap-highlight-color: transparent; transition: opacity .12s; }
    .press:active { opacity: .65; }
    /* hero shine animation */
    @keyframes heroShine {
      0% { transform: translateX(-100%) skewX(-15deg); }
      100% { transform: translateX(300%) skewX(-15deg); }
    }
    /* screen slide animations */
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOutLeft {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(-30%); opacity: 0; }
    }
    .screen-enter { animation: slideInRight .28s cubic-bezier(.32,.72,0,1) forwards; }
    /* toast */
    @keyframes toastIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes toastOut {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(20px); opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/design.js"></script>
  <script src="js/screens/login.js"></script>
  <script src="js/screens/admin.js"></script>
  <script src="js/screens/adminfleet.js"></script>
  <script src="js/screens/adminaddbike.js"></script>
  <script src="js/screens/adminbookings.js"></script>
  <script src="js/screens/adminusers.js"></script>
  <script src="js/screens/adminkyc.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
